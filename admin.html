<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Hotel New Born</title>
    <link rel="icon" type="image/jpeg" href="static/images/favicon.jpg">
    <link rel="stylesheet" href="static/css/admin.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Container -->
    <div id="login-container" class="login-container">
        <div class="login-box">
            <h2>Hotel New Born</h2>
            <p>Admin Control Panel</p>
            <form id="admin-login-form">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div id="login-error" class="error-msg" style="display: none;">Invalid username or password</div>
                <button type="submit" class="btn-primary">Secure Login</button>
            </form>
            <div class="login-footer">
                <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Website</a>
            </div>
        </div>
    </div>



    <script src="static/js/admin.js"></script>
</body>
</html>
